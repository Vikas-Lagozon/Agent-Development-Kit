<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
            margin-bottom: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 4em;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .cell:hover {
            background-color: #eee;
        }

        #message {
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #367C39;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2), 0 6px 20px 0 rgba(0,0,0,0.19);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div id="message">Waiting for game to start...</div>
        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button id="resetButton">Reset Game</button>
    </div>

    <!-- The Modal -->
    <div id="winnerModal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="winnermessage"></p>
        </div>
    </div>


    <script>
        const gameId = "mygame123"; // Change this to a unique ID
        const websocket = new WebSocket(`ws://192.168.1.5:8001/ws/${gameId}`);

        const board = document.getElementById("board");
        const cells = document.querySelectorAll(".cell");
        const message = document.getElementById("message");
        const resetButton = document.getElementById("resetButton");

        // Modal elements
        const winnerModal = document.getElementById("winnerModal");
        const winnerMessage = document.getElementById("winnermessage");
        const closeButton = document.getElementsByClassName("close")[0];


        websocket.onopen = () => {
            console.log("Connected to WebSocket");
            message.textContent = "Connected! Waiting for other player...";
        };

        websocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("Received:", data);
            updateBoard(data);
        };

        websocket.onclose = () => {
            console.log("Disconnected from WebSocket");
            message.textContent = "Disconnected from the server.";
        };

        websocket.onerror = (error) => {
            console.error("WebSocket error:", error);
            message.textContent = "Error connecting to the server.";
        };

        function updateBoard(data) {
            if (data.error) {
                message.textContent = "Error: " + data.error;
                return;
            }

            const boardState = data.board;
            const currentPlayer = data.currentPlayer;
            const winner = data.winner;
            const gameOver = data.gameOver;

            for (let i = 0; i < cells.length; i++) {
                cells[i].textContent = boardState[i];
                cells[i].style.cursor = gameOver ? 'not-allowed' : 'pointer';
            }

            if (gameOver) {
                if (winner) {
                    winnerMessage.textContent = `Player ${winner} wins!`;
                } else {
                    winnerMessage.textContent = "It's a draw!";
                }
                winnerModal.style.display = "flex"; // Show modal
                message.textContent = "Game Over!";
            } else {
                message.textContent = `Current player: ${currentPlayer}`;
            }
        }

        board.addEventListener("click", (event) => {
            // Prevent moves if game is over
            if (winnerModal.style.display === "flex") {
                return;
            }

            if (event.target.classList.contains("cell")) {
                const index = event.target.dataset.index;
                if (cells[index].textContent === "") {
                    websocket.send(JSON.stringify({ position: parseInt(index) }));
                }
            }
        });

        resetButton.addEventListener("click", () => {
            websocket.send(JSON.stringify({ action: "reset" }));
            winnerModal.style.display = "none"; // Hide modal on reset
        });

        // When the user clicks on <span> (x), close the modal
        closeButton.onclick = function() {
            winnerModal.style.display = "none";
        }

        // When the user clicks anywhere outside of the modal, close it
        window.onclick = function(event) {
            if (event.target == winnerModal) {
                winnerModal.style.display = "none";
            }
        }
    </script>
</body>
</html>
