[alembic]
# path to migration scripts
script_location = alembic

# The sqlalchemy.url will now be read from the app's settings in env.py,
# but we can set it here to read from an env var for clarity.
# Ensure your app/config.py loads a DATABASE_URL from your .env file.
sqlalchemy.url = %(DATABASE_URL)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
