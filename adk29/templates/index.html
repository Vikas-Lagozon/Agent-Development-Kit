<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis — AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="logo-text">JARVIS</span>
                </div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>New Conversation</span>
            </button>

            <div class="sessions-label">Conversations</div>

            <div class="sessions-list" id="sessions-list">
                {% for s in sessions %}
                <div class="session-item"
                     data-session-id="{{ s.id }}"
                     data-name="{{ s.name }}"
                     data-created-at="{{ s.created_at }}">
                </div>
                {% endfor %}
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobile-menu-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M3 12h18M3 18h18"/>
                        </svg>
                    </button>
                    <div class="session-indicator" id="session-indicator">
                        <span class="dot"></span>
                        <span id="current-session-label">No active session</span>
                    </div>
                </div>
                <div class="header-right">
                    <span class="status-badge">
                        <span class="status-dot"></span>
                        Gemini 2.5 Flash
                    </span>
                </div>
            </header>

            <div class="empty-state" id="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2>How can I assist you?</h2>
                <p>Ask me anything — code, concepts, analysis, or research.</p>
                <div class="suggestion-chips">
                    <button class="chip" data-text="Explain quantum computing in simple terms">Explain quantum computing</button>
                    <button class="chip" data-text="Write a Python hello world program">Write Python code</button>
                    <button class="chip" data-text="What are the latest AI news today?">Latest AI news</button>
                    <button class="chip" data-text="Help me brainstorm project ideas">Brainstorm ideas</button>
                </div>
            </div>

            <div class="chat-box" id="chat-box"></div>

            <div class="input-area">
                <form id="chat-form" autocomplete="off">
                    <div class="input-wrapper">
                        <textarea id="user-input" placeholder="Message Jarvis..." rows="1" maxlength="25000"></textarea>
                        <button type="submit" class="send-btn" id="send-btn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-footer">
                        <span class="char-count" id="char-count">0 / 25000</span>
                        <span class="hint"><kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
